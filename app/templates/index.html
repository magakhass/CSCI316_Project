<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hinglish Sentiment Analysis</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
      max-width: 600px;
      margin: 80px auto;
      padding: 0 1.5rem;
    }

    h1 { font-size: 1.6rem; margin-bottom: 0.3rem; }

    p.subtitle { color: #555; font-size: 0.9rem; margin-bottom: 2rem; }

    label { display: block; font-size: 0.95rem; font-weight: bold; margin-bottom: 0.4rem; }

    textarea {
      width: 100%;
      font-size: 1rem;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
      min-height: 90px;
      font-family: Arial, sans-serif;
    }

    button {
      margin-top: 0.8rem;
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover    { background: #333; }
    button:disabled { background: #999; cursor: not-allowed; }

    #result { margin-top: 1.5rem; font-size: 1.1rem; display: none; }

    #sentiment-text { font-weight: bold; font-size: 1.3rem; }
    #sentiment-text.positive { color: green; }
    #sentiment-text.negative { color: red; }
    #sentiment-text.neutral  { color: #0077cc; }

    #error-msg { margin-top: 1rem; color: red; font-size: 0.9rem; display: none; }
  </style>
</head>
<body>
  <h1>Hinglish Sentiment Analysis</h1>
  <p class="subtitle">XLM-R fine-tuned on SemEval 2020 Task 9 (SentiMix)</p>

  <label for="input-text">Enter a Hinglish sentence:</label>
  <textarea id="input-text" placeholder="yaar aaj ka din bahut accha tha..."></textarea>
  <br/>
  <button id="analyze-btn" onclick="analyze()">Analyze</button>

  <p id="error-msg"></p>

  <div id="result">
    Result: <span id="sentiment-text"></span>
  </div>

  <script>
    async function analyze() {
      const btn       = document.getElementById("analyze-btn");
      const input     = document.getElementById("input-text").value.trim();
      const resultDiv = document.getElementById("result");
      const errorMsg  = document.getElementById("error-msg");
      const badge     = document.getElementById("sentiment-text");

      // Reset previous result before every new request
      resultDiv.style.display = "none";
      errorMsg.style.display  = "none";
      badge.textContent       = "";
      badge.className         = "";

      if (!input) {
        errorMsg.textContent   = "Please enter a Hinglish sentence.";
        errorMsg.style.display = "block";
        return;
      }

      btn.disabled    = true;
      btn.textContent = "Analyzing...";

      try {
        const response = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: input })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.detail || "Something went wrong.");
        }

        const data = await response.json();

        badge.textContent       = data.sentiment.toUpperCase();
        badge.className         = data.sentiment;
        resultDiv.style.display = "block";

      } catch (err) {
        errorMsg.textContent   = "Error: " + err.message;
        errorMsg.style.display = "block";
      } finally {
        btn.disabled    = false;
        btn.textContent = "Analyze";
      }
    }

    document.getElementById("input-text").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) analyze();
    });
  </script>
</body>
</html>
